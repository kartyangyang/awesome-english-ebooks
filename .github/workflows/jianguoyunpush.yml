name: 同步外刊到坚果云

on:
  schedule:
    - cron: '0 22 * * 5'  # 每周五晚上10点自动运行
  workflow_dispatch:        # 允许你手动点一下运行

jobs:
  sync-to-jianguoyun:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取外刊仓库
        uses: actions/checkout@v4
        with:
          repository: hehonghui/awesome-english-ebooks
          path: ebooks

      - name: 安装 WebDAV 工具
        run: |
          sudo apt update
          sudo apt install -y cadaver

      - name: 上传到坚果云
        env:
          WEBDAV_URL: "https://dav.jianguoyun.com/dav/ebooks/"
          WEBDAV_USER: ${{ secrets.JIANGUOYUN_USER }}
          WEBDAV_PASS: ${{ secrets.JIANGUOYUN_PASS }}
        run: |
          cd ebooks
          find . -type f -name "*.pdf" | while read file; do
            cadaver << EOF
open $WEBDAV_URL
lcd "$(dirname "$file")"
cd "$(dirname "$file")"
put "$(basename "$file")"
quit
EOF
          done
